  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

m — negative space does the luxury work */\n\n  --radius-sm: 2px;   /* nearly square — the brand is crisp, not bubbly */\n  --radius-md: 4px;\n  --radius-pill: 999px;  /* seal/stamp shapes only */\n\n  --shadow-panel: 0 24px 60px rgba(0, 0, 0, 0.55);\n  --shadow-none: none;   /* default — depth comes from color, not shadows */\n\n  --ease-brand: cubic-bezier(0.25, 0.1, 0.25, 1); /* @kind other */\n  --duration-fast: 180ms; /* @kind other */\n  --duration-slow: 600ms; /* @kind other */ /* slow fades; nothing bounces */\n}\n<\u002Fstyle>\n  <style>/* Romance by Tata Oro — color tokens (sampled from production label artwork) */\n:root {\n  /* Base palette */\n  --ink: #0A0A0A;            /* primary background; pure #000000 for packaging */\n  --ink-pure: #000000;\n  --gold: #EAD1AE;           /* Champagne Gold — script, headlines, primary accent */\n  --gold-deep: #C8A26A;      /* Deep Gold — hover/pressed, dividers, secondary accent */\n  --butterscotch: #C39B6E;   /* warm mid-tone, iconography */\n  --cocoa: #D8C6B0;          /* Cocoa Cream — muted labels, captions */\n  --irish: #4A3728;          /* Irish Coffee — deep brown panels, depth on black */\n  --espresso: #6B4A3B;       /* brown text on cream surfaces */\n  --cream: #EDE3D6;          /* body copy on black */\n\n  /* Semantic aliases */\n  --surface-page: var(--ink);\n  --surface-panel: var(--irish);\n  --surface-card: #141110;   /* near-black card lift on ink */\n  --text-body: var(--cream);\n  --text-heading: var(--gold);\n  --text-muted: var(--cocoa);\n  --text-kicker: var(--butterscotch);\n  --text-on-gold: var(--ink);\n  --accent: var(--gold);\n  --accent-hover: var(--gold-deep);\n  --border-hairline: rgba(234, 209, 174, 0.25);  /* gold at 25% — hairline rules */\n  --border-subtle: rgba(234, 209, 174, 0.12);\n}\n\n/* Romance by Tata Oro — typography tokens\n   NOTE: the \"Romance\" cursive script is LOCKED ARTWORK (assets/wordmark-lockup.png), never a font.\n   Webfonts are Google Fonts substitutes pe :root {\n  --font-serif-display: 'Cormorant Garamond', 'Times New Roman', serif;\n  --font-sans: 'Montserrat', system-ui, sans-serif;\n\n  /* Scale */\n  --text-display: 500 clamp(44px, 6vw, 76px)/1.08 var(--font-serif-display);\n  --text-headline: 500 clamp(32px, 4vw, 48px)/1.15 var(--font-serif-display);\n  --text-title: 500 28px/1.2 var(--font-serif-display);\n  --text-quote: italic 500 clamp(26px, 3vw, 36px)/1.35 var(--font-serif-display);\n  --text-body-lg: 300 18px/1.75 var(--font-sans);\n  --text-body-md: 300 15.5px/1.7 var(--font-sans);\n  --text-caption: 400 13px/1.5 var(--font-sans);\n\n  /* Tracked-caps kicker — the \"TWO STORIES. ONE CUP.\" treatment */\n  --text-kicker-lg: 400 15px/1.4 var(--font-sans);\n  --text-kicker-sm: 500 11.5px/1.4 var(--font-sans);\n  --tracking-kicker: 0.32em;   /* wide, matches label */\n  --tracking-caps: 0.18em;     /* tighter caps, buttons/labels */\n}\n\n/* Romance by Tata Oro — spacing, radii, shadow, motion */\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 72px;\n  --space-9: 120px;   /* section breathing room — negative space does the luxury work */\n\n  --radius-sm: 2px;   /* nearly square — the brand is crisp, not bubbly */\n  --radius-md: 4px;\n  --radius-pill: 999px;  /* seal/stamp shapes only */\n\n  --shadow-panel: 0 24px 60px rgba(0, 0, 0, 0.55);\n  --shadow-none: none;   /* default — depth comes from color, not shadows */\n\n  --ease-brand: cubic-bezier(0.25, 0.1, 0.25, 1); /* @kind other */\n  --duration-fast: 180ms; /* @kind other */\n  --duration-slow: 600ms; /* @kind other */ /* slow fades; nothing bounces */\n}\n\n<\u002Fstyle>\n  <script src=\"904de8f0-8f64-4f3a-b758-a623b4a4727d\"><\u002Fscript>\n  <style>html, body { margin: 0; padding: 0; background: #0A0A0A; }<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"min-height: 100vh; background: var(--ink); color: var(--cream); font: var(--text-body-md); padding: 72px 24px 120px\">\n  <div style=\"max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 56px\">\n\n    <header style=\"text-align: center; display: flex; flex-direction: column; gap: 20px; align-items: center\">\n      <img src=\"5e2231e5-ea73-4219-97e6-bdcf2a984fd9\" alt=\"Romance by Tata Oro\" style=\"width: min(300px, 70vw)\">\n      <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Kicker\" size=\"lg\" color=\"var(--gold-deep)\" hint-size=\"auto,20px\">Help us choose · Ayúdanos a elegir<\u002Fx-import>\n      <p style=\"font: var(--text-body-md); color: var(--cocoa); margin: 0; max-width: 58ch\">Three landing pages for cafe.tataoro.com — same brand, same story, three art directions. Open each, then cast your vote below. Your pick helps us decide which cup the world sees first.<\u002Fp>\n    <\u002Fheader>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px\">\n      <a href=\"concept-a.html\" style=\"text-decoration: none\">\n        <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Card\" variant=\"lift\" hint-size=\"100%,220px\">\n          <div style=\"display: flex; flex-direction: column; gap: 14px\">\n            <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Kicker\" color=\"var(--butterscotch)\" hint-size=\"auto,16px\">Concept A<\u002Fx-import>\n            <div style=\"font: var(--text-title); color: var(--gold)\">Editorial Romance<\u002Fdiv>\n            <p style=\"font: var(--text-body-md); color: var(--cream); margin: 0\">Story-first cinematic scroll. Photo chapters, slow rises, sticky buy bar carries conversion. Most brand-romantic.<\u002Fp>\n            <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Kicker\" color=\"var(--cocoa)\" hint-size=\"auto,16px\">Open concept A →<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fx-import>\n      <\u002Fa>\n      <a href=\"concept-b.html\" style=\"text-decoration: none\">\n        <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Card\" variant=\"lift\" hint-size=\"100%,220px\">\n          <div style=\"display: flex; flex-direction: column; gap: 14px\">\n            <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Kicker\" color=\"var(--butterscotch)\" hint-size=\"auto,16px\">Concept B<\u002Fx-import>\n            <div style=\"font: var(--text-title); color: var(--gold)\">Luxe Minimal · Product Hero<\u002Fdiv>\n            <p style=\"font: var(--text-body-md); color: var(--cream); margin: 0\">Bag front and center on pure black. Buy above the fold, three true lines of story, fastest path to checkout. Most conversion-optimized.<\u002Fp>\n            <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Kicker\" color=\"var(--cocoa)\" hint-size=\"auto,16px\">Open concept B →<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fx-import>\n      <\u002Fa>\n      <a href=\"concept-c.html\" style=\"text-decoration: none\">\n        <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Card\" variant=\"lift\" hint-size=\"100%,220px\">\n          <div style=\"display: flex; flex-direction: column; gap: 14px\">\n            <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Kicker\" color=\"var(--butterscotch)\" hint-size=\"auto,16px\">Concept C<\u002Fx-import>\n            <div style=\"font: var(--text-title); color: var(--gold)\">Warm Ritual · Bilingual<\u002Fdiv>\n            <p style=\"font: var(--text-body-md); color: var(--cream); margin: 0\">EN/ES parallel copy throughout, the ritual as three steps, creator trust foregrounded on warm brown panels. Most audience-native.<\u002Fp>\n            <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Kicker\" color=\"var(--cocoa)\" hint-size=\"auto,16px\">Open concept C →<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fx-import>\n      <\u002Fa>\n    <\u002Fdiv>\n\n    <!-- VOTE PANEL -->\n    <section style=\"border-top: 1px solid var(--border-hairline); padding-top: 48px; display: flex; flex-direction: column; gap: 28px\">\n      <div style=\"text-align: center; display: flex; flex-direction: column; gap: 10px; align-items: center\">\n        <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Kicker\" color=\"var(--gold-deep)\" hint-size=\"auto,16px\">Cast your vote · Vota por tu favorita<\u002Fx-import>\n        <p style=\"font: var(--text-body-md); color: var(--cocoa); margin: 0; max-width: 52ch\">{{ voteHint }}<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px\">\n        <sc-for list=\"{{ concepts }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ c.vote }}\" style=\"{{ c.cardStyle }}\" style-hover=\"border-color: var(--gold-deep)\">\n            <div style=\"display: flex; align-items: baseline; justify-content: space-between; gap: 8px\">\n              <span style=\"font: var(--text-kicker-sm); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--butterscotch)\">Concept {{ c.key }}<\u002Fspan>\n              <span style=\"font: var(--text-caption); color: var(--cocoa)\">{{ c.pctLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font: var(--text-title); color: var(--gold); text-align: left\">{{ c.name }}<\u002Fdiv>\n            <div style=\"height: 6px; border-radius: var(--radius-pill); background: rgba(234,209,174,0.12); overflow: hidden\">\n              <div style=\"{{ c.barStyle }}\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 8px\">\n              <span style=\"font: var(--text-caption); color: var(--cocoa)\">{{ c.countLabel }}<\u002Fspan>\n              <span style=\"{{ c.pickStyle }}\">{{ c.pickLabel }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center\">\n        <span style=\"font: var(--text-caption); color: var(--cocoa)\">{{ totalLabel }}<\u002Fspan>\n        <sc-if value=\"{{ hasVoted }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ resetVote }}\" style=\"background: none; border: none; color: var(--gold-deep); font: var(--text-caption); letter-spacing: var(--tracking-caps); text-transform: uppercase; cursor: pointer; padding: 4px 8px\">Change my vote<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <p style=\"font: var(--text-caption); color: rgba(216,198,176,0.55); margin: 0; text-align: center; max-width: 60ch; margin-inline: auto\">Tallies are stored on this device — a shared live count needs a backend, which we can wire up when the store goes live.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- DESIGNER'S SCORECARD -->\n    <section style=\"border-top: 1px solid var(--border-hairline); padding-top: 48px; display: flex; flex-direction: column; gap: 24px\">\n      <x-import component-from-global-scope=\"RomanceByTataOroDesignSystem_1abb3c.Kicker\" hint-size=\"auto,16px\">Designer’s scorecard · Rubric 1–5<\u002Fx-import>\n      <div style=\"display: grid; grid-template-columns: minmax(160px, 1fr) repeat(3, minmax(60px, 100px)); gap: 12px; font: var(--text-body-md); align-items: baseline\">\n        <div style=\"font: var(--text-caption); color: var(--cocoa)\">Criterion<\u002Fdiv>\n        <div style=\"font: var(--text-caption); color: var(--butterscotch); text-align: center\">A<\u002Fdiv>\n        <div style=\"font: var(--text-caption); color: var(--butterscotch); text-align: center\">B<\u002Fdiv>\n        <div style=\"font: var(--text-caption); color: var(--butterscotch); text-align: center\">C<\u002Fdiv>\n\n        <div>Brand &amp; story fit<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">5<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">3<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">4<\u002Fdiv>\n        <div>Conversion potential<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">3<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">5<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">4<\u002Fdiv>\n        <div>Premium “wow”<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">4<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">5<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">3<\u002Fdiv>\n        <div>Mobile-first (IG funnel)<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">4<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">5<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">4<\u002Fdiv>\n        <div>Differentiation<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">4<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">3<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">5<\u002Fdiv>\n        <div>Build feasibility<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">4<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">5<\u002Fdiv><div style=\"text-align: center; color: var(--gold)\">4<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font: var(--text-body-md); color: var(--cream); margin: 0; max-width: 64ch\"><strong style=\"color: var(--gold)\">Recommendation:<\u002Fstrong> B wins on the primary KPI (single-click conversion, mobile), but the brand is the story — I’d ship B’s hero + buy flow with A’s story chapters and C’s bilingual parallel copy. The captain rules.<\u002Fp>\n      <p style=\"font: var(--text-caption); color: var(--cocoa); margin: 0\">Open items: final price (gated on Elkin), Shopify tokens/IDs (placeholders wired in shopify-buy.js), tasting-note confirmation, photography for the image slots.<\u002Fp>\n    <\u002Fsection>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  KEY_VOTES = 'romance_bakeoff_votes';\n  KEY_MINE = 'romance_bakeoff_myvote';\n  META = [\n    { key: 'A', name: 'Editorial Romance' },\n    { key: 'B', name: 'Luxe Minimal' },\n    { key: 'C', name: 'Warm Ritual' },\n  ];\n\n  API = '/api/votes';\n  state = { votes: { A: 0, B: 0, C: 0 }, mine: null, online: false };\n\n  componentDidMount() {\n    try { this.setState({ mine: localStorage.getItem(this.KEY_MINE) || null }); } catch (e) {}\n    this.refresh();\n  }\n\n  async refresh() {\n    try {\n      const r = await fetch(this.API, { headers: { 'accept': 'application/json' } });\n      if (!r.ok) throw new Error('bad');\n      const v = await r.json();\n      this.setState({ votes: { A: v.A|0, B: v.B|0, C: v.C|0 }, online: true });\n    } catch (e) {\n      // No backend (e.g. design preview) — stay in local-only mode.\n      this.setState({ online: false });\n    }\n  }\n\n  rememberMine(mine) {\n    try {\n      if (mine) localStorage.setItem(this.KEY_MINE, mine);\n      else localStorage.removeItem(this.KEY_MINE);\n    } catch (e) {}\n  }\n\n  // Optimistic local update, then reconcile with the server's authoritative tally.\n  applyLocal(prev, next) {\n    const votes = { ...this.state.votes };\n    if (prev && votes[prev] > 0) votes[prev] -= 1;\n    if (next) votes[next] = (votes[next] || 0) + 1;\n    this.setState({ votes, mine: next });\n    this.rememberMine(next);\n    return votes;\n  }\n\n  async send(prev, next) {\n    try {\n      const r = await fetch(this.API, {\n        method: 'POST',\n        headers: { 'content-type': 'application/json' },\n        body: JSON.stringify({ prev, pick: next }),\n      });\n      if (!r.ok) throw new Error('bad');\n      const v = await r.json();\n      this.setState({ votes: { A: v.A|0, B: v.B|0, C: v.C|0 }, online: true });\n    } catch (e) { this.setState({ online: false }); }\n  }\n\n  castVote(key) {\n    const prev = this.state.mine;\n    if (prev === key) return;\n    this.applyLocal(prev, key);\n    this.send(prev, key);\n  }\n\n  resetVote() {\n    const prev = this.state.mine;\n    this.applyLocal(prev, null);\n    this.send(prev, null);\n  }\n\n  renderVals() {\n    const votes = this.state.votes;\n    const total = votes.A + votes.B + votes.C;\n    const mine = this.state.mine;\n    const concepts = this.META.map(m => {\n      const count = votes[m.key] || 0;\n      const pct = total > 0 ? Math.round((count / total) * 100) : 0;\n      const picked = mine === m.key;\n      return {\n        key: m.key,\n        name: m.name,\n        pctLabel: total > 0 ? pct + '%' : '—',\n        countLabel: count === 1 ? '1 vote' : count + ' votes',\n        cardStyle: [\n          'display: flex', 'flex-direction: column', 'gap: 12px', 'text-align: left',\n          'padding: 20px', 'cursor: pointer',\n          'background: ' + (picked ? 'var(--surface-panel)' : 'var(--surface-card)'),\n          'border: 1px solid ' + (picked ? 'var(--gold)' : 'var(--border-subtle)'),\n          'border-radius: var(--radius-md)',\n          'transition: border-color 180ms var(--ease-brand), background 180ms var(--ease-brand)',\n        ].join('; '),\n        barStyle: 'height: 100%; width: ' + pct + '%; background: ' + (picked ? 'var(--gold)' : 'var(--gold-deep)') + '; transition: width 600ms var(--ease-brand)',\n        pickLabel: picked ? 'Your pick' : 'Tap to vote',\n        pickStyle: 'font: var(--text-kicker-sm); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: ' + (picked ? 'var(--gold)' : 'var(--gold-deep)'),\n        vote: () => this.castVote(m.key),\n      };\n    });\n    return {\n      concepts,\n      hasVoted: !!mine,\n      totalLabel: (total === 0 ? 'Be the first to vote' : (total === 1 ? '1 vote so far' : total + ' votes so far')) + (this.state.online ? '' : ' · offline'),\n      voteHint: mine\n        ? 'Thanks — you picked ' + (this.META.find(m => m.key === mine) || {}).name + '. Tap another to change it.'\n        : 'Tap the concept you would ship. One vote per visitor.',\n      resetVote: () => this.resetVote(),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
